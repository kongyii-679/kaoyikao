<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>美容初级师 · 考证题库 (150题含解析)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #fdf7f2;
            padding: 20px 15px 40px;
            color: #2e241f;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #9e6b5e;
            border-left: 6px solid #d9b2a2;
            padding-left: 20px;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .subhead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            color: #6f4e41;
            font-weight: 500;
            border-bottom: 1px dashed #dbc2b8;
            padding-bottom: 12px;
        }
        .stats {
            background: #fff1ea;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }
        button {
            background: #b78e81;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(158, 107, 94, 0.2);
            transition: all 0.15s;
            border: 1px solid #a77b6e;
        }
        button:hover {
            background: #9e6b5e;
            box-shadow: 0 6px 10px rgba(98, 59, 48, 0.15);
            transform: translateY(-1px);
        }
        button.outline {
            background: transparent;
            color: #6f4e41;
            border: 1.5px solid #c9ad9f;
            box-shadow: none;
        }
        button.outline:hover {
            background: #f3e7e2;
            border-color: #9e6b5e;
        }
        .progress-container {
            flex: 1;
            min-width: 200px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        progress {
            width: 100%;
            height: 14px;
            border-radius: 20px;
            overflow: hidden;
            accent-color: #a77b6e;
        }
        progress::-webkit-progress-bar { background-color: #ecdcd4; border-radius: 20px; }
        progress::-webkit-progress-value { background-color: #9e6b5e; border-radius: 20px; }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .question-card {
            background: white;
            border-radius: 28px;
            padding: 22px 26px;
            box-shadow: 0 8px 20px rgba(158, 107, 94, 0.08);
            border: 1px solid #f2e2db;
            transition: box-shadow 0.2s;
        }
        .question-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 16px;
        }
        .q-num {
            background: #ead5cc;
            color: #3f2a22;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .q-text {
            font-weight: 600;
            font-size: 1.2rem;
            line-height: 1.5;
            color: #2f1d15;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px 18px;
            margin: 16px 0 8px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fcf7f4;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #ecd9d0;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1rem;
        }
        .option:hover {
            background: #faece5;
            border-color: #b78e81;
        }
        .option input {
            accent-color: #9e6b5e;
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }
        .answer-section {
            margin-top: 18px;
            border-top: 1px dashed #e2cec5;
            padding-top: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .show-answer-btn {
            background: none;
            border: 1.5px solid #d7bcb0;
            color: #5e3e33;
            padding: 7px 18px;
            font-size: 0.9rem;
            box-shadow: none;
            font-weight: 500;
        }
        .show-answer-btn:hover {
            background: #f2e2db;
            border-color: #9e6b5e;
        }
        .explanation {
            margin-top: 16px;
            background: #f7efe9;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 0.98rem;
            color: #3a2b24;
            border-left: 5px solid #bb8b7a;
            line-height: 1.5;
            display: none;
        }
        .explanation.show {
            display: block;
        }
        .correct-badge {
            background: #9fc5a8;
            color: #1f3d2b;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .wrong-badge {
            background: #e0b4b4;
            color: #711515;
        }
        .footer-note {
            margin-top: 40px;
            text-align: right;
            color: #aa8a7c;
            font-size: 0.9rem;
        }
        .reset-area {
            display: flex;
            gap: 8px;
        }
        /* 移动端优化 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .question-card { padding: 16px; }
            .options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌸 美容初级师 · 考证题库</h1>
    <div class="subhead">
        <span>📋 150题 · 含详细解析</span>
        <span class="stats" id="progressDisplay">已答 0 / 150</span>
    </div>

    <div class="action-bar">
        <div class="progress-container">
            <div class="progress-label">
                <span>📊 答题进度</span>
                <span id="progressPercent">0%</span>
            </div>
            <progress id="quizProgress" value="0" max="150"></progress>
        </div>
        <div class="reset-area">
            <button id="resetAllBtn" class="outline">🧹 重置所有答案</button>
            <button id="showAllAnswersBtn">📖 展开所有解析</button>
        </div>
    </div>

    <div id="quizContainer" class="quiz-grid"></div>
    <div class="footer-note">
        ⚡ 点击选项即可作答 · 每道题可查看解析
    </div>
</div>

<script>
    (function(){
        // ----- 美容初级题库 (150题) -----
        // 题目涵盖：皮肤生理、基础护理、化妆、美体、卫生法规、产品知识等初级美容师考证范围
        const questions = [
            // 1-20 皮肤基础知识
            { q: "皮肤最外层是？", options: ["真皮", "表皮", "皮下组织", "基底膜"], answer: 1, exp: "表皮是皮肤最外层，包括角质层、透明层、颗粒层等，起主要屏障作用。" },
            { q: "正常情况下，皮肤 pH 值约为？", options: ["3.0-4.0", "4.5-6.5", "7.0-7.5", "8.0-9.0"], answer: 1, exp: "健康皮肤表面呈弱酸性，pH约4.5~6.5，有助抵抗微生物。" },
            { q: "以下哪种不是皮肤的附属器？", options: ["毛发", "指甲", "汗腺", "血管"], answer: 3, exp: "皮肤的附属器包括毛发、皮脂腺、汗腺、指(趾)甲；血管属于真皮内结构。" },
            { q: "皮脂膜的主要作用？", options: ["保温", "滋润皮肤、抑菌", "产生黑色素", "排泄汗液"], answer: 1, exp: "皮脂膜是由皮脂、汗液等形成的弱酸性膜，可滋润皮肤、抑制细菌。" },
            { q: "黑色素细胞位于表皮的哪一层？", options: ["角质层", "颗粒层", "基底层", "透明层"], answer: 2, exp: "黑色素细胞主要位于基底层，产生黑色素决定肤色。" },
            { q: "真皮的主要成分是？", options: ["角质蛋白", "胶原纤维和弹性纤维", "脂肪酸", "黑色素"], answer: 1, exp: "真皮富含胶原纤维、弹性纤维及基质，赋予皮肤弹性与韧性。" },
            { q: "干性皮肤的特点？", options: ["毛孔粗大", "易出油", "皮脂分泌少，易起皮", "易长痤疮"], answer: 2, exp: "干性皮肤皮脂分泌少，皮肤干燥、缺乏光泽，易起皮屑。" },
            { q: "衰老皮肤产生皱纹的主要原因是？", options: ["皮脂分泌过多", "胶原蛋白流失", "角质层过厚", "黑色素过多"], answer: 1, exp: "随着年龄增长胶原蛋白和弹性纤维减少，皮肤松弛产生皱纹。" },
            { q: "表皮更替时间大约为？", options: ["7天", "14天", "28天", "45天"], answer: 2, exp: "表皮通过时间约为28天，从基底层到角质层脱落。" },
            { q: "以下哪种维生素被称为“抗坏血酸”，有助美白？", options: ["维生素A", "维生素B", "维生素C", "维生素E"], answer: 2, exp: "维生素C（抗坏血酸）可抑制黑色素，抗氧化，常用于美白产品。" },
            { q: "美容师操作前进行手部消毒常用的酒精浓度？", options: ["50%", "75%", "95%", "100%"], answer: 1, exp: "75%酒精消毒效果最佳，过高浓度会使表面蛋白凝固阻碍渗透。" },
            { q: "皮肤中具有免疫功能的细胞是？", options: ["黑素细胞", "朗格汉斯细胞", "基底细胞", "成纤维细胞"], answer: 1, exp: "朗格汉斯细胞是表皮内的免疫细胞，参与免疫应答。" },
            { q: "皮肤类型中“T区油，两颊干”属于？", options: ["干性", "油性", "混合性", "敏感性"], answer: 2, exp: "混合性皮肤特征为T区（额头、鼻子、下巴）较油，两颊偏干。" },
            { q: "皮脂腺分泌过于旺盛易引发？", options: ["皱纹", "色斑", "痤疮/粉刺", "过敏"], answer: 2, exp: "皮脂过多堵塞毛囊口，易引起痤疮、粉刺。" },
            { q: "以下哪项不是导致皮肤敏感的因素？", options: ["过度去角质", "使用温和洁面", "季节变化", "酒精类化妆品"], answer: 1, exp: "温和洁面不会破坏屏障；但过度去角质、酒精等易导致敏感。" },
            { q: "表皮中不含血管，营养依靠？", options: ["真皮渗透", "淋巴液", "皮脂腺供给", "空气吸收"], answer: 0, exp: "表皮无血管，营养和氧气由真皮渗透供给。" },
            { q: "雀斑多发于？", options: ["胸部", "面部、鼻梁", "手背", "后背"], answer: 1, exp: "雀斑常见于面部，尤其是鼻梁和两颊，与遗传和日晒有关。" },
            { q: "防晒产品中的 SPF 是指？", options: ["防晒黑时间", "防晒伤时间", "防晒红剂量", "防UVA能力"], answer: 1, exp: "SPF主要衡量对UVB的防护，即防晒伤/晒红的时间。" },
            { q: "痤疮丙酸杆菌与哪种皮肤问题最相关？", options: ["黄褐斑", "青春痘", "老年斑", "白癜风"], answer: 1, exp: "痤疮丙酸杆菌在毛囊内增殖可引发炎症，形成痘痘。" },
            { q: "油性皮肤日常护理重点？", options: ["加强滋润", "清洁控油", "大量去角质", "只用清水"], answer: 1, exp: "油性皮肤应适度清洁、控油补水，保持水油平衡。" },
            // 21-40 美容护肤操作
            { q: "面部清洁的第一步通常是？", options: ["爽肤", "卸妆", "按摩", "敷面膜"], answer: 1, exp: "若有妆容需先卸妆，再用洗面奶进行二次清洁。" },
            { q: "正常皮肤去角质建议频率？", options: ["每天", "每周1-2次", "每月1次", "从不"], answer: 1, exp: "温和去角质每周1-2次即可，过度去角质会损伤屏障。" },
            { q: "爽肤水的主要作用是？", options: ["保湿滋润", "二次清洁与平衡pH", "防晒", "去黑头"], answer: 1, exp: "爽肤水可平衡洁面后的pH值，补充水分，部分有二次清洁作用。" },
            { q: "按摩膏的主要作用是？", options: ["清洁毛孔", "促进血液循环", "去角质", "美白"], answer: 1, exp: "按摩膏用来润滑，配合手法促进血液循环和产品吸收。" },
            { q: "敷软膜粉时，应该避开哪些部位？", options: ["眼周、唇部", "额头", "下巴", "面颊"], answer: 0, exp: "眼周和唇部皮肤较薄，应避开或使用专用眼唇膜。" },
            { q: "美容院超声波导入仪主要作用是？", options: ["脱毛", "深层清洁", "促进产品吸收", "去痘"], answer: 2, exp: "超声波利用高频振动使有效成分渗透，促进吸收。" },
            { q: "面部刮痧板常用材质？", options: ["牛角或玉石", "塑料", "不锈钢", "黄金"], answer: 0, exp: "牛角、玉石等材质光滑，与皮肤亲和力好。" },
            { q: "冷喷机主要适用于什么皮肤？", options: ["衰老皮肤", "敏感性皮肤", "油性皮肤", "粗糙皮肤"], answer: 1, exp: "冷喷可镇静、舒缓敏感泛红、收缩毛孔。" },
            { q: "清除粉刺时，美容师第一步应？", options: ["直接挤压", "酒精消毒皮肤", "热喷打开毛孔", "敷面膜"], answer: 2, exp: "热喷或热敷使毛孔张开，更易清除且减少损伤。" },
            { q: "面部护理结束涂抹防晒的作用？", options: ["保湿", "防止紫外线伤害", "提亮肤色", "收细毛孔"], answer: 1, exp: "白天护理后必须防晒，预防光老化及色斑。" },
            { q: "美容师服务时口罩的作用？", options: ["美观", "防止飞沫污染", "防止吸入粉尘", "法规要求"], answer: 1, exp: "戴口罩主要防止操作时飞沫污染顾客面部及无菌区。" },
            { q: "按摩方向一般应为？", options: ["由上往下", "由下往上，由内向外", "随意", "画圈即可"], answer: 1, exp: "提拉手法从下往上、由内向外，对抗地心引力。" },
            { q: "眼部护理应该使用？", options: ["眼霜配合轻柔点按", "面霜厚涂", "磨砂膏", "高浓度酒精"], answer: 0, exp: "眼部皮肤薄，需专用眼霜并用无名指轻拍。" },
            { q: "海藻面膜主要功效？", options: ["去角质", "补水舒缓", "脱毛", "抗老"], answer: 1, exp: "海藻面膜富含胶质，补水保湿、镇静舒缓。" },
            { q: "美容院毛巾消毒常用？", options: ["清水冲洗", "75%酒精浸泡", "高温蒸汽或消毒柜", "晾晒"], answer: 2, exp: "毛巾须经高温蒸汽、消毒柜等方式达到卫生标准。" },
            { q: "顾客有严重痤疮炎症时，美容师应该？", options: ["直接针清", "建议就医", "敷去角质", "用精油按摩"], answer: 1, exp: "严重炎症痤疮属皮肤疾病，应建议就医，不可擅自处理。" },
            { q: "使用奥桑喷雾(臭氧)时，与面部距离？", options: ["5cm", "10cm", "25-30cm", "50cm以上"], answer: 2, exp: "奥桑喷雾距离面部约25-30cm，以免烫伤或过浓臭氧刺激。" },
            { q: "敷面膜时间一般建议？", options: ["5分钟", "10分钟", "15-20分钟", "1小时"], answer: 2, exp: "贴片面膜或软膜一般15-20分钟，过久反吸水分。" },
            { q: "美容师手部有小伤口应？", options: ["继续操作", "用防水创可贴并戴指套", "不处理", "酒精擦拭即可"], answer: 1, exp: "应做好防护，戴手套或指套，防止交叉感染。" },
            { q: "可溶性面膜粉调配时应？", options: ["用热水", "用纯净水调至糊状", "加酒精", "加醋"], answer: 1, exp: "用纯净水/蒸馏水调成糊状，现调现用。" },
            // 41-60 化妆品基础
            { q: "以下属于油性原料的是？", options: ["甘油", "凡士林", "透明质酸", "胶原"], answer: 1, exp: "凡士林是矿物油脂，封闭性好；甘油为保湿剂。" },
            { q: "表面活性剂的作用？", options: ["清洁、乳化", "增稠", "防腐", "着色"], answer: 0, exp: "表面活性剂可降低表张，起清洁、乳化、发泡作用。" },
            { q: "化妆品保质期开封后一般多久用完？", options: ["3个月", "6M/12M", "5年", "永远"], answer: 1, exp: "包装上“6M”表示开封后6个月内用完。" },
            { q: "以下哪种成分常用于防晒？", options: ["二氧化钛", "滑石粉", "云母", "硅石"], answer: 0, exp: "二氧化钛是物理防晒剂，反射紫外线。" },
            { q: "香水中的酒精主要作用是？", options: ["溶解香精", "保湿", "润滑", "染色"], answer: 0, exp: "酒精作为溶剂挥发香精，并带来清爽感。" },
            { q: "膏霜类产品中乳化体类型？", options: ["水包油或油包水", "全油", "水溶液", "粉末"], answer: 0, exp: "膏霜乳液多为乳化体，如水包油(O/W)或油包水(W/O)。" },
            { q: "收敛水一般含有？", options: ["酒精、金缕梅", "大量油脂", "果酸", "维生素C"], answer: 0, exp: "收敛水含酒精、金缕梅等，暂时收缩毛孔。" },
            { q: "以下哪一个不是保湿剂？", options: ["甘油", "丁二醇", "玻尿酸", "硅油"], answer: 3, exp: "硅油主要提供顺滑感，保湿性弱；甘油等为吸湿保湿剂。" },
            { q: "果酸的主要功效？", options: ["保湿", "去角质、焕肤", "防晒", "脱毛"], answer: 1, exp: "果酸可加速角质代谢，改善粗糙暗沉。" },
            { q: "化妆品中尼泊金酯类作用是？", options: ["防腐", "香精", "色素", "增稠"], answer: 0, exp: "尼泊金酯为常见防腐剂。" },
